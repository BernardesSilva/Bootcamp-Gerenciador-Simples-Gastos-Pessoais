<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceX - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <div class="card main-panel">
            <div class="header-main">
                <h1 class="logo">💰 FinanceX</h1>
                <div class="header-actions">
                    <button onclick="prepararFechamento()" class="btn-finish">🔒 Finalizar Mês</button>
                    <button onclick="confirmarAcao('ATUAL')" class="btn-clear">Limpar Atual</button>
                </div>
            </div>
            
            <div class="input-group">
                <div class="field">
                    <input type="text" id="desc" placeholder="Descrição">
                    <span class="error-msg">Obrigatório!</span>
                </div>
                <div class="field">
                    <input type="number" id="valor" placeholder="R$ 0,00" step="0.01">
                    <span class="error-msg">Mín. R$ 0,10!</span>
                </div>
                <div class="field">
                    <input type="date" id="data">
                    <span class="error-msg">Inválido!</span>
                </div>
                <select id="categoria">
                    <option value="Alimentação">🛒 Alimentação</option>
                    <option value="Transporte">🚗 Transporte</option>
                    <option value="Lazer">🍿 Lazer</option>
                    <option value="Outros">⚙️ Outros</option>
                </select>
                <button onclick="adicionarGasto()" id="btn-registrar">Registrar</button>
            </div>

            <div id="cards-categorias" class="category-grid"></div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Descrição</th>
                            <th>Categoria</th>
                            <th>Data</th>
                            <th>Valor</th>
                            <th>Ação</th>
                        </tr>
                    </thead>
                    <tbody id="corpo-tabela"></tbody>
                </table>
            </div>
        </div>

        <div class="side-panel">
            <div class="card budget-card">
                <h3>Minha Renda</h3>
                <div class="budget-input">
                    <input type="number" id="renda-input" placeholder="Ex: 1400,00">
                    <button onclick="definirRenda()">Definir</button>
                </div>
            </div>

            <div class="card info-card">
                <p class="total-label">Gasto Total (Atual):</p>
                <h2 id="total-valor">R$ 0,00</h2>
                <div class="progress-bar-bg">
                    <div id="progress-bar" class="progress-bar-fill"></div>
                </div>
                <div class="meta-status">
                    <small id="display-meta">Orçamento: R$ 0,00</small>
                    <small id="saldo-meta">R$ 0,00 restantes</small>
                </div>
            </div>

            <div class="card history-card">
                <h3>📂 Histórico de Meses</h3>
                <ul id="lista-meses-fechados"></ul>
            </div>

            <div class="card chart-card">
                <canvas id="meuGrafico"></canvas>
            </div>

            <div class="version-tag">v1.0.0</div>
        </div>
    </div>

    <div id="modal-historico" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-titulo">Detalhes do Mês</h2>
                <span class="close-modal" onclick="fecharModal('modal-historico')">&times;</span>
            </div>
            <div class="modal-body">
                <table>
                    <thead>
                        <tr>
                            <th>Descrição</th>
                            <th>Categoria</th>
                            <th>Data</th>
                            <th>Valor</th>
                        </tr>
                    </thead>
                    <tbody id="corpo-modal"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="modal-confirmacao" class="modal">
        <div class="modal-content confirm-box">
            <span class="close-modal" onclick="fecharModal('modal-confirmacao')" style="float:right; margin-top:-10px">&times;</span>
            <h3 id="confirm-titulo" style="margin-top:10px">Tem certeza?</h3>
            <p id="confirm-mensagem"></p>
            <div class="confirm-buttons">
                <button id="btn-confirmar-sim" class="btn-sim">Sim, Confirmar</button>
                <button onclick="fecharModal('modal-confirmacao')" class="btn-nao">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
